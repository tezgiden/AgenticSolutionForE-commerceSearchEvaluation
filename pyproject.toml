# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: debug-statements
      - id: name-tests-test
        args: ['--pytest-test-first']
      - id: requirements-txt-fixer

  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies: [types-requests]

  - repo: https://github.com/pycqa/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']

  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.2
    hooks:
      - id: python-safety-dependencies-check

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.12.0
    hooks:
      - id: commitizen

---

# .editorconfig
root = true

[*]
charset = utf-8
end_of_line = lf
insert_final_newline = true
trim_trailing_whitespace = true

[*.{py,pyi}]
indent_style = space
indent_size = 4
max_line_length = 100

[*.{yml,yaml}]
indent_style = space
indent_size = 2

[*.{json,toml}]
indent_style = space
indent_size = 2

[*.md]
trim_trailing_whitespace = false

[Makefile]
indent_style = tab

---

# Makefile
.PHONY: help install install-dev test test-cov lint format type-check clean build docs serve-docs

# Default target
help:
	@echo "Available targets:"
	@echo "  install      - Install package for production"
	@echo "  install-dev  - Install package for development"
	@echo "  test         - Run tests"
	@echo "  test-cov     - Run tests with coverage"
	@echo "  lint         - Run linting (flake8)"
	@echo "  format       - Run code formatting (black, isort)"
	@echo "  type-check   - Run type checking (mypy)"
	@echo "  clean        - Clean build artifacts"
	@echo "  build        - Build package"
	@echo "  docs         - Build documentation"
	@echo "  serve-docs   - Serve documentation locally"
	@echo "  pre-commit   - Run pre-commit hooks"
	@echo "  all-checks   - Run all quality checks"

# Installation
install:
	pip install -e .

install-dev:
	pip install -e .[dev,testing,docs]
	pre-commit install

# Testing
test:
	pytest tests/ -v

test-cov:
	pytest tests/ --cov=llm_evaluator --cov-report=html --cov-report=term-missing

test-integration:
	pytest tests/test_integration.py -v -m integration

test-performance:
	pytest tests/test_performance.py -v -m performance --benchmark-only

# Code quality
lint:
	flake8 llm_evaluator/ tests/

format:
	black llm_evaluator/ tests/
	isort llm_evaluator/ tests/

type-check:
	mypy llm_evaluator/

# Pre-commit
pre-commit:
	pre-commit run --all-files

# All quality checks
all-checks: lint type-check test-cov

# Build and packaging
clean:
	rm -rf build/
	rm -rf dist/
	rm -rf *.egg-info/
	rm -rf .coverage
	rm -rf htmlcov/
	rm -rf .pytest_cache/
	rm -rf .mypy_cache/
	find . -type d -name __pycache__ -delete
	find . -type f -name "*.pyc" -delete

build: clean
	python -m build

# Documentation
docs:
	sphinx-build -b html docs/ docs/_build/html

serve-docs:
	sphinx-autobuild docs/ docs/_build/html --open-browser

# Development utilities
run-example:
	python examples/examples.py

run-quick-test:
	python -c "from llm_evaluator import run_quick_test; run_quick_test()"

validate-system:
	python -m llm_evaluator.cli validate

# Security
security-scan:
	bandit -r llm_evaluator/
	safety check

# Docker operations
docker-build:
	docker build -t llm-evaluator:latest .

docker-test:
	docker-compose --profile test up --abort-on-container-exit

# Release preparation
prepare-release: all-checks build docs
	@echo "Release preparation complete!"
	@echo "Next steps:"
	@echo "1. Update version in pyproject.toml and __init__.py"
	@echo "2. Update CHANGELOG.md"
	@echo "3. Create and push git tag"
	@echo "4. Upload to PyPI: twine upload dist/*"

