# CHANGELOG.md
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

### Added
- Comprehensive test framework with unit, integration, and performance tests
- Docker support with multi-stage builds
- CI/CD pipeline with GitHub Actions
- Security scanning with Bandit and Safety
- Documentation with Sphinx

### Changed
- Complete architectural refactor from monolithic to modular design
- Improved error handling with custom exception classes
- Enhanced logging with structured logging support

### Fixed
- Various parsing issues with malformed JSON responses
- Memory leaks in long-running evaluations

## [2.0.0] - 2024-01-15

### Added
- **Breaking Change**: Complete system refactor into modular architecture
- New `SearchEvaluationEngine` class for orchestrating evaluations
- `EvaluationRequest` and `EvaluationResult` dataclasses for type safety
- Factory patterns for easy component creation and customization
- Builder pattern for complex engine configuration
- Comprehensive inventory analysis with `InventoryAnalyzer` class
- Pluggable search classification system with `SearchClassifier` interface
- Template-based prompt management with `PromptTemplateManager`
- Structured response parsing with fallback mechanisms
- Executive summary generation with business recommendations
- Command-line interface with `click` framework
- Docker support for containerized deployments
- Comprehensive testing framework with pytest
- CI/CD pipeline with GitHub Actions
- Security scanning and dependency management
- Structured logging with configurable levels and formats
- Custom exception classes for better error handling
- Performance monitoring and metrics collection

### Changed
- **Breaking Change**: Public API completely redesigned
- Configuration now uses `LLMConfig` dataclass instead of global constants
- Search type classification moved to dedicated `SearchClassifier` classes
- Inventory parsing moved to dedicated `InventoryParser` class
- Prompt generation moved to `PromptTemplateManager`
- Response parsing moved to `ResponseParser` classes
- All components now follow dependency injection pattern
- Improved error handling with context-aware exceptions
- Enhanced debugging capabilities with structured debug output

### Deprecated
- Old function-based API (maintained for backward compatibility)

### Removed
- Global configuration constants
- Monolithic evaluation function
- Hard-coded prompt templates

### Fixed
- JSON parsing issues with malformed LLM responses
- Memory leaks in long-running evaluations
- Inconsistent error handling across components
- Race conditions in concurrent evaluations

### Security
- Added security scanning with Bandit
- Dependency vulnerability scanning with Safety
- Container security scanning with Trivy
- Secrets detection in CI/CD pipeline

## [1.0.0] - 2023-12-01

### Added
- Initial release with monolithic architecture
- Basic LLM evaluation functionality
- Simple inventory consideration
- Support for part number and English word queries
- Basic error handling and retry mechanisms
- Simple configuration through environment variables

### Features
- Ollama integration for LLM inference
- Basic prompt templates for different search types
- Simple JSON response parsing
- Inventory-aware ranking
- Debug output capabilities

