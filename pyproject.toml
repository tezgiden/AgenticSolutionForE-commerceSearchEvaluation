# CONTRIBUTING.md
# Contributing to LLM Search Result Evaluation System

Thank you for your interest in contributing! This document provides guidelines and information for contributors.

## Table of Contents

- [Code of Conduct](#code-of-conduct)
- [Getting Started](#getting-started)
- [Development Setup](#development-setup)
- [Contributing Process](#contributing-process)
- [Code Standards](#code-standards)
- [Testing](#testing)
- [Documentation](#documentation)

## Code of Conduct

This project adheres to a code of conduct. By participating, you are expected to uphold this code.

## Getting Started

### Prerequisites

- Python 3.8 or higher
- Git
- Docker (optional, for containerized development)

### Development Setup

1. Fork the repository
2. Clone your fork:
   ```bash
   git clone https://github.com/your-username/llm-search-evaluator.git
   cd llm-search-evaluator
   ```

3. Create a virtual environment:
   ```bash
   python -m venv .venv
   source .venv/bin/activate  # On Windows: .venv\Scripts\activate
   ```

4. Install development dependencies:
   ```bash
   make install-dev
   ```

5. Set up pre-commit hooks:
   ```bash
   pre-commit install
   ```

6. Verify installation:
   ```bash
   make test
   ```

## Contributing Process

1. **Create a branch** for your feature or bugfix:
   ```bash
   git checkout -b feature/your-feature-name
   ```

2. **Make your changes** following the code standards

3. **Add tests** for new functionality

4. **Run quality checks**:
   ```bash
   make all-checks
   ```

5. **Commit your changes** with a descriptive message:
   ```bash
   git commit -m "feat: add new search classifier for ML-based classification"
   ```

6. **Push to your fork** and create a pull request

## Code Standards

### Python Style

- Follow [PEP 8](https://www.python.org/dev/peps/pep-0008/)
- Use [Black](https://github.com/psf/black) for code formatting
- Use [isort](https://github.com/PyCQA/isort) for import sorting
- Maximum line length: 100 characters

### Type Hints

- Use type hints for all function signatures
- Use `typing` module for complex types
- Use `Optional` for optional parameters

### Documentation

- Write docstrings for all public functions and classes
- Use Google-style docstrings
- Include examples in docstrings when helpful

### Architecture

- Follow SOLID principles
- Use dependency injection
- Prefer composition over inheritance
- Keep classes focused and small

## Testing

### Test Structure

- Unit tests: `tests/test_*.py`
- Integration tests: `tests/test_integration.py`
- Performance tests: `tests/test_performance.py`

### Running Tests

```bash
# All tests
make test

# With coverage
make test-cov

# Specific test file
pytest tests/test_inventory.py -v

# Integration tests only
pytest tests/test_integration.py -v -m integration
```

### Writing Tests

- Write tests for all new functionality
- Use descriptive test names
- Use fixtures for common test data
- Mock external dependencies
- Test both success and failure cases

## Documentation

### Code Documentation

- Write clear, concise docstrings
- Include parameter and return type information
- Provide usage examples

### README Updates

- Update README.md for significant changes
- Include new configuration options
- Update usage examples

### API Documentation

- Update API documentation for interface changes
- Include migration guides for breaking changes

## Release Process

1. Update version in `pyproject.toml` and `__init__.py`
2. Update `CHANGELOG.md`
3. Create and push a git tag
4. GitHub Actions will handle the rest

## Getting Help

- Open an issue for bugs or feature requests
- Use GitHub Discussions for questions
- Check existing issues and documentation first

